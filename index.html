<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domínio à Venda</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow:
        0 0 20px rgba(120, 80, 255, 0.8),
        0 0 40px rgba(120, 80, 255, 0.4);
      margin-bottom: 30px;
      line-height: 1.1;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, #7850ff, #ff50c8);
      margin: 0 auto 30px auto;
      border-radius: 2px;
    }

    .email {
      font-size: 22px;
      color: #cccccc;
      letter-spacing: 1px;
    }

    .email a {
      color: #a78bff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .email a:hover {
      color: #ff50c8;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Domínio<br>à Venda</h1>
    <div class="divider"></div>
    <p class="email">Email: <a href="mailto:igor3345@hotmail.com">igor3345@hotmail.com</a></p>
  </div>
</body>
</html>
